<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --accent: #06b6d4;
            --dark: #0f172a;
            --gray: #64748b;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(6, 182, 212, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
            animation: bgMove 25s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(20px, -20px) rotate(3deg); }
            66% { transform: translate(-15px, 15px) rotate(-3deg); }
        }

        /* Floating Elements */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .float-item {
            position: absolute;
            font-size: 24px;
            opacity: 0.1;
            animation: floatAround 20s infinite;
        }

        .float-item:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .float-item:nth-child(2) { left: 85%; top: 15%; animation-delay: 3s; }
        .float-item:nth-child(3) { left: 70%; top: 75%; animation-delay: 6s; }
        .float-item:nth-child(4) { left: 15%; top: 70%; animation-delay: 9s; }
        .float-item:nth-child(5) { left: 50%; top: 10%; animation-delay: 2s; }
        .float-item:nth-child(6) { left: 90%; top: 50%; animation-delay: 5s; }

        @keyframes floatAround {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
            25% { transform: translateY(-30px) rotate(10deg); opacity: 0.2; }
            50% { transform: translateY(-15px) rotate(-5deg); opacity: 0.15; }
            75% { transform: translateY(-40px) rotate(5deg); opacity: 0.2; }
        }

        /* Main Container - Landscape Layout */
        .error-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px 50px;
            display: flex;
            align-items: center;
            gap: 50px;
            max-width: 900px;
            width: 100%;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Left Section - Error Visual */
        .error-visual {
            flex-shrink: 0;
            text-align: center;
        }

        .error-icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .error-icon-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 50%;
            opacity: 0.15;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.15); opacity: 0.25; }
        }

        .error-icon {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .error-icon svg {
            width: 60px;
            height: 60px;
            stroke: var(--primary);
            stroke-width: 1.5;
            fill: none;
        }

        .error-code {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 50%, #ec4899 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            animation: gradientMove 4s ease infinite;
            letter-spacing: -3px;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        /* Vertical Divider */
        .divider-vertical {
            width: 1px;
            height: 200px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.15), transparent);
            flex-shrink: 0;
        }

        /* Right Section - Content */
        .error-content {
            flex: 1;
            text-align: left;
        }

        .error-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .error-message {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 25px;
        }

        /* Search Box (Optional) */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .search-input::placeholder {
            color: var(--gray);
        }

        .search-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-btn {
            padding: 12px 16px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .search-btn svg {
            width: 18px;
            height: 18px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        /* Popular Links */
        .popular-links {
            margin-bottom: 20px;
        }

        .popular-links-title {
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .links-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .link-tag {
            padding: 6px 12px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            color: var(--primary);
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s;
        }

        .link-tag:hover {
            background: rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
        }

        /* Contact Info */
        .contact-info {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 13px;
            color: var(--gray);
            flex-wrap: wrap;
        }

        .contact-label {
            color: var(--white);
            font-weight: 600;
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .contact-link:hover {
            color: #a78bfa;
        }

        .contact-link svg {
            width: 14px;
            height: 14px;
        }

        /* Responsive - Portrait / Mobile */
        @media (max-width: 768px) {
            .error-container {
                flex-direction: column;
                text-align: center;
                padding: 35px 25px;
                gap: 25px;
            }

            .divider-vertical {
                width: 80%;
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            }

            .error-content {
                text-align: center;
            }

            .error-icon-wrapper {
                width: 100px;
                height: 100px;
            }

            .error-icon svg {
                width: 48px;
                height: 48px;
            }

            .error-code {
                font-size: 64px;
            }

            .error-title {
                font-size: 22px;
            }

            .search-box {
                flex-direction: column;
            }

            .action-buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 250px;
            }

            .popular-links {
                text-align: center;
            }

            .links-list {
                justify-content: center;
            }

            .contact-info {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }

        /* Large Screens */
        @media (min-width: 1024px) {
            .error-container {
                padding: 50px 60px;
                gap: 60px;
            }

            .error-icon-wrapper {
                width: 140px;
                height: 140px;
            }

            .error-icon svg {
                width: 70px;
                height: 70px;
            }

            .error-code {
                font-size: 100px;
            }

            .error-title {
                font-size: 30px;
            }

            .error-message {
                font-size: 15px;
            }

            .divider-vertical {
                height: 250px;
            }
        }
    </style>
</head>
